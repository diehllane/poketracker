<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokéTracker — Daycare</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
</head>
<body class="inner-page">
  <nav class="navbar">
    <div class="nav-brand">
      <a href="dashboard.html" class="nav-back">←</a>
      <div class="pokeball-icon small"></div>
      <span>Daycare</span>
    </div>
    <div class="nav-right">
      <span id="navUsername" class="nav-user"></span>
      <button id="logoutBtn" class="btn-ghost">Logout</button>
    </div>
  </nav>

  <main class="page-main">
    <div class="page-header">
      <h2>Daycare Services</h2>
      <div class="header-actions">
        <div class="price-setting">
          <label>Rate: <strong id="rateDisplay">15k</strong> per 1kk EXP</label>
          <button id="editRateBtn" class="btn-ghost small">Edit Rate</button>
          <div id="rateEditForm" class="inline-edit hidden">
            <input type="number" id="rateInput" min="1" step="1" placeholder="15" />
            <span>k per 1kk EXP</span>
            <button id="saveRateBtn" class="btn-primary small">Save</button>
            <button id="cancelRateBtn" class="btn-ghost small">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Add Entry Form (outside the table so renders never destroy it) -->
    <div class="add-entry-form">
      <div class="add-form-fields">
        <div class="add-field">
          <label>Username</label>
          <input type="text" id="dc-username" placeholder="Username" />
        </div>
        <div class="add-field">
          <label>Discord</label>
          <input type="text" id="dc-discord" placeholder="Discord" />
        </div>
        <div class="add-field">
          <label>Pokémon</label>
          <input type="text" id="dc-pokemon" placeholder="Pokémon" />
        </div>
        <div class="add-field add-field-levels">
          <label>Levels</label>
          <div class="level-inputs">
            <select id="dc-level-start"><option value="">From</option></select>
            <span>→</span>
            <select id="dc-level-finish"><option value="">To</option></select>
          </div>
        </div>
        <div class="add-field">
          <label>EXP (kk)</label>
          <input type="text" id="dc-exp" readonly class="calculated-field" placeholder="Auto" />
        </div>
        <div class="add-field">
          <label>Date</label>
          <input type="date" id="dc-date" />
        </div>
        <div class="add-field">
          <label>Rate (k)</label>
          <input type="number" id="dc-rate" placeholder="Default" step="0.01" min="0" />
        </div>
        <div class="add-field">
          <label>Price (k)</label>
          <input type="text" id="dc-price" readonly class="calculated-field" placeholder="Auto" />
        </div>
        <div class="add-field add-field-btn">
          <label>&nbsp;</label>
          <button id="addEntryBtn" class="btn-primary">+ Add</button>
        </div>
      </div>
      <div id="dcError" class="error-msg hidden"></div>
    </div>

    <!-- Entries Table -->
    <div class="table-container">
      <div id="loadingState" class="loading-state">Loading entries...</div>
      <div id="emptyState" class="empty-state hidden">
        <span class="empty-icon">🥚</span>
        <p>No daycare entries yet. Use the form above to add your first one!</p>
      </div>
      <table id="daycareTable" class="data-table hidden">
        <thead>
          <tr>
            <th class="col-drag"></th>
            <th>Username</th>
            <th>Discord</th>
            <th>Pokémon</th>
            <th>Levels</th>
            <th>EXP (kk)</th>
            <th>Received Date</th>
            <th>Rate (k)</th>
            <th>Price (k)</th>
            <th>Complete</th>
            <th>Notify</th>
            <th>Returned</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="daycareBody"></tbody>
      </table>
    </div>

    <div class="totals-bar" id="totalsBar">
      <span>Total Entries: <strong id="totalEntries">0</strong></span>
      <span>Total EXP: <strong id="totalExp">0</strong> kk</span>
      <span>Total Earnings: <strong id="totalEarnings">0</strong> k</span>
    </div>
  </main>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/daycare.js"></script>
</body>
</html>
