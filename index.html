<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokéTracker — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-bg">
    <div class="pokeball-bg"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div class="pokeball-icon"></div>
        <h1>PokéTracker</h1>
        <p class="login-subtitle">Guild Management System</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="trainer@guild.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <div id="loginError" class="error-msg hidden"></div>
        <button type="submit" class="btn-primary" id="loginBtn">
          <span>Enter</span>
        </button>
      </form>
    </div>
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
